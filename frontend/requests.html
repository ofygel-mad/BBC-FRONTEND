<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявки — BBC</title>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<div id="app-header-root"></div>

<div class="main-content">
    <div class="page-body">

      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Заявки</h1>
        </div>
        <div class="page-header-actions">
          <div class="view-toggle">
            <button type="button" class="view-btn" id="btn-calendar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>Календарь</span>
            </button>
            <button type="button" class="view-btn active" id="btn-board">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              <span>Доска</span>
            </button>
            <button type="button" class="view-btn" id="btn-list">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              <span>Список</span>
            </button>
          </div>
          <button type="button" class="filter-icon-btn" id="btn-filter" aria-label="Фильтры">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </button>
          <button type="button" class="btn btn-primary" id="btn-create">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Создать
          </button>
        </div>
      </div>

      <div class="filter-bar hidden" id="filter-bar">
        <select class="filter-select" id="f-client" aria-label="Фильтр по клиенту"><option value="">Все клиенты</option></select>
        <select class="filter-select" id="f-type" aria-label="Фильтр по типу">
          <option value="">Все типы</option>
          <option value="external">Внешние</option>
          <option value="internal">Внутренние</option>
        </select>
        <select class="filter-select" id="f-assignee" aria-label="Фильтр по исполнителю"><option value="">Все исполнители</option></select>
        <input class="search-filter" id="f-search" type="text" placeholder="Номер заявки" aria-label="Поиск по номеру заявки" />
      </div>

      <div id="view-board">
        <div class="kanban-board" id="kanban-board"></div>
      </div>

      <div id="view-list" class="hidden">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Клиент</th>
                <th>№ заявки</th>
                <th>Дата и время</th>
                <th>Тип</th>
                <th>Описание</th>
                <th>Дедлайн</th>
                <th>Исполнитель</th>
                <th>Состояние</th>
              </tr>
            </thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>
      </div>

      <div id="view-calendar" class="hidden">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <p>Вид «Календарь» в разработке</p>
        </div>
      </div>

    </div>
  </div>

<div class="modal-overlay" id="modal-request">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Новая заявка</h3>
      <button type="button" class="modal-close" id="modal-close-btn" aria-label="Закрыть">×</button>
    </div>
    <div class="form-group">
      <label class="form-label" for="r-client">Клиент</label>
      <select class="form-select" id="r-client" aria-label="Клиент"></select>
    </div>
    <div class="form-group">
      <label class="form-label" for="r-type">Тип</label>
      <select class="form-select" id="r-type" aria-label="Тип заявки">
        <option value="external">Внешняя</option>
        <option value="internal">Внутренняя</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="r-title">Название</label>
      <input class="form-input" id="r-title" type="text" placeholder="Описание заявки" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="r-assignee">Исполнитель</label>
        <select class="form-select" id="r-assignee" aria-label="Исполнитель"></select>
      </div>
      <div class="form-group">
        <label class="form-label" for="r-deadline">Дедлайн</label>
        <input class="form-input" id="r-deadline" type="datetime-local" aria-label="Дедлайн" />
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" id="modal-cancel-btn">Отмена</button>
      <button type="button" class="btn btn-primary" id="modal-save-btn">Создать</button>
    </div>
  </div>
</div>

<script type="module" src="js/requests.js"></script>
</body>
</html>
