<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Клиенты — BBC</title>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<div id="app-header-root"></div>

<div class="main-content">
    <div class="page-body">

      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Клиенты</h1>
        </div>
        <div class="page-header-actions">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="search" type="text" class="search-input" placeholder="Поиск по имени, БИН/ИИН..." aria-label="Поиск" />
          </div>
          <select id="filter-status" class="filter-select" aria-label="Фильтр по статусу">
            <option value="">Все статусы</option>
            <option value="active">Активные</option>
            <option value="inactive">Неактивные</option>
          </select>
          <select id="filter-type" class="filter-select" aria-label="Фильтр по типу">
            <option value="">Все типы</option>
            <option value="Юридическое лицо">ТОО / АО</option>
            <option value="ИП">ИП</option>
            <option value="ГКП">ГКП</option>
          </select>
          <button type="button" class="btn btn-primary" id="btn-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Наименование</th>
              <th>БИН / ИИН</th>
              <th>Тип</th>
              <th>Телефон</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="clients-tbody"></tbody>
        </table>
      </div>
      <div id="empty-clients" class="empty-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <p>Клиенты не найдены</p>
      </div>

    </div>
  </div>

<div class="modal-overlay" id="client-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Добавить клиента</h3>
      <button type="button" class="modal-close" id="modal-close" aria-label="Закрыть">×</button>
    </div>
    <form id="client-form" novalidate>
      <input type="hidden" id="client-id" />
      <div class="form-group">
        <label class="form-label" for="f-name">Наименование *</label>
        <input id="f-name" type="text" class="form-input" placeholder="ТОО «Название»" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-bin">БИН / ИИН *</label>
          <input id="f-bin" type="text" class="form-input" placeholder="123456789012" maxlength="12" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-type">Тип *</label>
          <select id="f-type" class="form-select" aria-label="Тип клиента">
            <option>Юридическое лицо</option>
            <option>ИП</option>
            <option>АО</option>
            <option>ГКП</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-phone">Телефон</label>
        <input id="f-phone" type="tel" class="form-input" placeholder="+7 700 000 00 00" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-status">Статус</label>
        <select id="f-status" class="form-select" aria-label="Статус клиента">
          <option value="active">Активный</option>
          <option value="inactive">Неактивный</option>
        </select>
      </div>
      <p id="form-error" class="form-error"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="btn-cancel">Отмена</button>
        <button type="submit" class="btn btn-primary" id="btn-save">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/clients.js"></script>
</body>
</html>
