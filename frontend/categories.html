<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Категории заявок — BBC</title>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<div id="app-header-root"></div>

<div class="main-content">
    <div class="page-body">

      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Категории заявок</h1>
        </div>
        <div class="page-header-actions">
          <button type="button" class="btn btn-primary" id="btn-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Название</th>
              <th>Описание</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="cat-tbody"></tbody>
        </table>
      </div>
      <div id="empty-cat" class="empty-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
        <p>Категории не найдены</p>
      </div>

    </div>
  </div>

<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Добавить категорию</h3>
      <button type="button" class="modal-close" id="modal-close" aria-label="Закрыть">×</button>
    </div>
    <form id="cat-form" novalidate>
      <input type="hidden" id="cat-id" />
      <div class="form-group">
        <label class="form-label" for="f-name">Название *</label>
        <input id="f-name" type="text" class="form-input" placeholder="Отчётность по НДС" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-desc">Описание</label>
        <textarea id="f-desc" class="form-textarea" placeholder="Краткое описание категории"></textarea>
      </div>
      <p id="form-error" class="form-error"></p>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="btn-cancel">Отмена</button>
        <button type="submit" class="btn btn-primary" id="btn-save">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/categories.js"></script>
</body>
</html>
