name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: salyk_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d salyk_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/salyk_ci
      FRONTEND_URL: http://127.0.0.1:3000
      JWT_SECRET: test-secret-key-with-at-least-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter ./backend generate

      - name: Build application
        run: pnpm run build

      - name: Prepare database
        run: pnpm run db:test:prepare

      - name: Run backend integration tests
        run: pnpm run test:backend

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
